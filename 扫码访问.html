<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小小科学家 - 扫码访问</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #F0F7F0 0%, #E8F5E9 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 40px 36px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(67,160,71,0.12);
  }
  .card h1 { font-size: 24px; color: #2D3436; margin-bottom: 6px; }
  .card .subtitle { font-size: 14px; color: #90A490; margin-bottom: 24px; }
  .qrcode-container {
    background: #F5FBF5;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .qrcode-container img { max-width: 240px; height: auto; }
  .url-box {
    background: #F5FBF5;
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 24px;
    word-break: break-all;
    font-size: 12px;
    color: #636E72;
    font-family: monospace;
  }
  .instructions {
    text-align: left;
    color: #636E72;
    font-size: 13px;
    line-height: 1.8;
  }
  .instructions li { margin-bottom: 6px; list-style: none; padding-left: 4px; }
  .instructions li::before { content: '✦ '; color: #81C784; font-weight: bold; }
  .badge {
    display: inline-block;
    background: #E8F5E9;
    color: #43A047;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    background: linear-gradient(135deg, #43A047, #66BB6A);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    margin-top: 16px;
    font-family: inherit;
  }
  .btn:hover { opacity: 0.9; }
  hr { border: none; border-top: 1px solid #E8F0E8; margin: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="badge">🌱 扫码直达</div>
  <h1>小小科学家</h1>
  <p class="subtitle">上海交大文创学院 · 六一文创礼盒</p>

  <div class="qrcode-container">
    <img src="二维码.png" alt="二维码">
  </div>

  <div class="url-box">https://racen233.github.io/little-scientist/</div>

  <hr>

  <ul class="instructions">
    <li>用手机扫描二维码即可打开网页</li>
    <li>首次进入请<strong>输入你的名字</strong>，建立专属植物世界</li>
    <li>在<strong>知识问答</strong>中学习10种植物知识</li>
    <li>在<strong>成长记录</strong>中拍照上传、写下观察日记</li>
    <li>所有数据保存在你的手机浏览器中</li>
  </ul>

  <a class="btn" href="https://racen233.github.io/little-scientist/" target="_blank">🌿 在浏览器中打开</a>
</div>
</body>
</html>
