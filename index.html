<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小小科学家 - 植物探索</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: #F0F7F0;
    color: #2D3436;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    background: linear-gradient(135deg, #43A047 0%, #66BB6A 100%);
    padding: 48px 24px 24px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(67,160,71,0.2);
    position: relative;
  }
  .header h1 { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 4px; }
  .header p { font-size: 14px; color: #E8F5E9; margin-bottom: 2px; }
  .header .subtitle { font-size: 11px; color: #C8E6C9; letter-spacing: 2px; font-weight: 300; }

  /* User Greeting */
  .greeting-card {
    background: #fff;
    margin: -20px 16px 0;
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 2;
  }
  .greeting-card .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #E8F5E9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .greeting-card .info { flex: 1; }
  .greeting-card .info .name { font-size: 15px; font-weight: 600; }
  .greeting-card .info .hint { font-size: 12px; color: #90A490; margin-top: 2px; }
  .greeting-card input {
    border: none;
    background: #F5FBF5;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    width: 140px;
    outline: none;
    font-family: inherit;
    transition: box-shadow 0.2s;
  }
  .greeting-card input:focus { box-shadow: 0 0 0 2px #81C784; }
  .greeting-card .btn-name {
    background: #43A047;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* Tab Bar */
  .tab-bar {
    display: flex;
    margin: 12px 16px 0;
    background: #E8F0E8;
    border-radius: 24px;
    padding: 4px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    border: none;
    background: transparent;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    color: #90A490;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
  }
  .tab-btn.active {
    background: #fff;
    color: #43A047;
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  /* Section */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 16px 16px 10px;
  }
  .section-header h2 { font-size: 18px; font-weight: 700; }
  .section-header span { font-size: 12px; color: #90A490; }

  /* Plant Cards */
  .plant-list { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .plant-card {
    background: #fff;
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .plant-card:active { transform: scale(0.98); }
  .plant-card .accent {
    width: 6px; height: 44px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .plant-card .emoji { font-size: 24px; width: 32px; text-align: center; }
  .plant-card .info { flex: 1; }
  .plant-card .info .name { font-size: 15px; font-weight: 600; }
  .plant-card .info .meta { font-size: 11px; color: #90A490; margin-top: 2px; }
  .plant-card .arrow { font-size: 18px; color: #B2BEC3; }

  /* Plant Detail */
  .detail-page {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #F0F7F0;
    z-index: 100;
    overflow-y: auto;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .detail-page.show { display: block; }
  .detail-header {
    padding: 48px 24px 24px;
    text-align: center;
    position: relative;
  }
  .detail-header .big-emoji { font-size: 48px; margin-bottom: 8px; }
  .detail-header h2 { font-size: 28px; font-weight: 800; color: #fff; }
  .detail-header .sub { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px; }
  .detail-header .flower-lang { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; margin-top: 4px; }
  .back-btn {
    position: absolute;
    top: 52px; left: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qa-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
  .qa-item {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.03);
  }
  .qa-item .q { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #2D3436; }
  .qa-item .a { font-size: 13px; color: #636E72; line-height: 1.6; }

  /* Growth Record */
  .growth-page { padding: 0 16px 30px; display: none; }
  .growth-page.show { display: block; }

  /* Date & plant selector */
  .record-form { display: flex; flex-direction: column; gap: 14px; }
  .form-row { display: flex; gap: 10px; }
  .form-row select, .form-row input {
    flex: 1;
    padding: 10px 14px;
    border: none;
    background: #F5FBF5;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    color: #2D3436;
  }
  .form-row select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%2390A490' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }

  /* Photo Upload */
  .photo-upload {
    border: 2px dashed #C8E6C9;
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    background: #F5FBF5;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .photo-upload:active { background: #E8F5E9; }
  .photo-upload .icon { font-size: 32px; color: #81C784; margin-bottom: 6px; }
  .photo-upload .text { font-size: 13px; color: #90A490; }
  .photo-upload input[type="file"] { display: none; }
  .photo-upload .preview {
    max-width: 100%;
    max-height: 200px;
    border-radius: 10px;
    object-fit: contain;
  }
  .photo-upload .remove-photo {
    position: absolute;
    top: 8px; right: 8px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: none;
  }
  .photo-upload.has-photo .remove-photo { display: flex; align-items: center; justify-content: center; }
  .photo-upload.has-photo .icon, .photo-upload.has-photo .text { display: none; }
  .remove-photo-backdrop {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
  }

  /* Diary */
  .diary-card {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .diary-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .diary-card textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    border: none;
    background: #F5FBF5;
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    line-height: 1.5;
  }
  .diary-card textarea:focus { box-shadow: 0 0 0 2px #81C784; }

  /* Save Button */
  .btn-save {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #43A047, #66BB6A);
    color: #fff;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(67,160,71,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-save:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(67,160,71,0.3); }

  /* History */
  .history-section { margin-top: 24px; }
  .history-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .history-item {
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    display: flex;
    gap: 12px;
  }
  .history-item .thumb {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: #F5FBF5;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .history-item .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .history-item .thumb .no-photo { font-size: 24px; opacity: 0.3; }
  .history-item .hist-info { flex: 1; }
  .history-item .hist-info .hist-date { font-size: 12px; color: #90A490; }
  .history-item .hist-info .hist-plant { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .history-item .hist-info .hist-diary { font-size: 13px; color: #636E72; line-height: 1.5; margin-top: 4px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #90A490;
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ====== Q&A Chat ====== */
  .qa-chat { padding: 0 16px 20px; display: none; flex-direction: column; }
  .qa-chat.show { display: flex; }
  .chat-messages {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    min-height: 260px;
    max-height: 420px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .chat-msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.3s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .chat-msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #43A047, #66BB6A);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.bot {
    align-self: flex-start;
    background: #F5FBF5;
    color: #2D3436;
    border-bottom-left-radius: 4px;
    position: relative;
  }
  .chat-msg.bot .plant-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .chat-msg.bot .msg-text { font-size: 13px; color: #636E72; line-height: 1.6; }
  .chat-msg .msg-time {
    font-size: 10px;
    color: #B2BEC3;
    margin-top: 4px;
    text-align: right;
  }
  .chat-msg.user .msg-time { color: rgba(255,255,255,0.5); }
  .chat-input-area {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }
  .chat-input-area input {
    flex: 1;
    padding: 12px 16px;
    border: none;
    background: #fff;
    border-radius: 22px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .chat-input-area input:focus { box-shadow: 0 0 0 2px #81C784; }
  .chat-input-area .btn-send {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #43A047, #66BB6A);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(67,160,71,0.3);
  }
  .chat-input-area .btn-send:active { transform: scale(0.95); }
  .chat-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 8px 0 4px;
  }
  .chat-suggestions .chip {
    padding: 6px 14px;
    background: #E8F5E9;
    border-radius: 16px;
    font-size: 12px;
    color: #43A047;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: background 0.2s;
  }
  .chat-suggestions .chip:active { background: #C8E6C9; }
  .chat-welcome {
    text-align: center;
    padding: 30px 20px;
    color: #90A490;
  }
  .chat-welcome .icon { font-size: 36px; margin-bottom: 8px; }
  .chat-welcome p { font-size: 13px; line-height: 1.6; }
  .chat-msg.bot .qa-source {
    display: block;
    font-size: 11px;
    color: #B2BEC3;
    margin-top: 6px;
    border-top: 1px solid #E8F0E8;
    padding-top: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Modal for name input */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px 20px;
    width: 100%;
    max-width: 320px;
    text-align: center;
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-box h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .modal-box p { font-size: 13px; color: #636E72; margin-bottom: 16px; line-height: 1.5; }
  .modal-box input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #E8F0E8;
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    margin-bottom: 12px;
  }
  .modal-box input:focus { border-color: #81C784; }
  .modal-box .btn-start {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #43A047, #66BB6A);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #F0F7F0; }
  ::-webkit-scrollbar-thumb { background: #C8E6C9; border-radius: 2px; }

  @media (max-width: 360px) {
    .greeting-card input { width: 100px; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<!-- Offline support -->
<div id="app">

<!-- Header -->
<div class="header">
  <h1>🌱 小小科学家</h1>
  <p>探索植物世界的奥秘</p>
  <div class="subtitle">交大文创学院 · 六一文创礼盒</div>
</div>

<!-- Greeting Card -->
<div class="greeting-card" id="greetingCard">
  <div class="avatar" id="avatarDisplay">🌱</div>
  <div class="info" id="greetingInfo">
    <div class="name" id="greetingName">你好，小小科学家！</div>
    <div class="hint" id="greetingHint">输入你的名字开始探索吧</div>
  </div>
  <input type="text" id="nameInput" placeholder="输入你的名字" maxlength="10">
  <button class="btn-name" id="btnSetName">确定</button>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="knowledge">🌿 知识问答</button>
  <button class="tab-btn" data-tab="qa">🤖 智能问答</button>
  <button class="tab-btn" data-tab="growth">📸 成长记录</button>
</div>

<!-- Section: Knowledge Q&A -->
<div id="tabKnowledge">
  <div class="section-header">
    <h2>🔬 植物知识问答</h2>
    <span id="plantCount">10种植物</span>
  </div>
  <div class="plant-list" id="plantList"></div>
</div>

<!-- Section: Smart Q&A Chat -->
<div class="qa-chat" id="tabQA">
  <div class="section-header">
    <h2>🤖 我来回答</h2>
    <span>向小助手提问吧</span>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-welcome" id="chatWelcome">
      <div class="icon">🌻</div>
      <p>你好！我是植物小助手 🤖<br>关于这10种植物，你有什么想知道的吗？<br>试试问我吧！</p>
    </div>
  </div>
  <div class="chat-suggestions" id="chatSuggestions"></div>
  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="输入你的问题..." maxlength="100">
    <button class="btn-send" id="btnSend" onclick="askQuestion()">➤</button>
  </div>
</div>

<!-- Section: Growth Record -->
<div class="growth-page" id="tabGrowth">
  <div class="section-header">
    <h2>📸 我的成长记录</h2>
  </div>

  <div class="record-form">
    <div class="form-row">
      <select id="growthPlant"><option value="">选择植物</option></select>
      <input type="date" id="growthDate">
    </div>

    <div class="photo-upload" id="photoUpload" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <div class="icon">📷</div>
      <div class="text">点击拍摄或上传植物照片</div>
      <img class="preview" id="photoPreview" alt="">
      <button class="remove-photo" id="removePhoto" onclick="event.stopPropagation(); clearPhoto()">✕</button>
    </div>

    <div class="diary-card">
      <h3>📝 观察日记</h3>
      <textarea id="diaryInput" placeholder="今天你的植物有什么变化？它发芽了吗？长高了多少？你有什么发现？..." rows="4"></textarea>
    </div>

    <button class="btn-save" onclick="saveRecord()">💾  保存今天的记录</button>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection">
    <h3>📖 成长日记</h3>
    <div id="historyList"></div>
  </div>
</div>

<!-- Plant Detail Page -->
<div class="detail-page" id="detailPage">
  <div class="detail-header" id="detailHeader">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="big-emoji" id="detailEmoji"></div>
    <h2 id="detailName"></h2>
    <div class="sub" id="detailSub"></div>
    <div class="flower-lang" id="detailFlowerLang"></div>
  </div>
  <div class="qa-list" id="qaList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Name Modal (first visit) -->
<div class="modal-overlay" id="nameModal">
  <div class="modal-box">
    <h2>🌱 欢迎你，小小科学家！</h2>
    <p>在开始探索之前，请告诉我你的名字吧～这样你的专属植物世界就会为你打开！</p>
    <input type="text" id="modalNameInput" placeholder="你的名字" maxlength="10">
    <button class="btn-start" onclick="setFirstTimeName()">开始探索 →</button>
  </div>
</div>

</div>

<script>
// ======== Plant Data ========
const PLANTS = [
  { id: 'morning-glory', name: '牵牛花', eng: 'Morning Glory', emoji: '🌸', color: '#9C27B0', keyword: '勤奋',

// ======== User State ========
const STORAGE_KEY_PREFIX = 'scientist_';

function getUserId() { return localStorage.getItem(STORAGE_KEY_PREFIX + 'userId'); }
function getUserName() { return localStorage.getItem(STORAGE_KEY_PREFIX + 'userName') || ''; }
function getRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY_PREFIX + 'records_' + getUserId()) || '[]'); } catch { return []; }
}
function saveRecords(records) {
  try {
    localStorage.setItem(STORAGE_KEY_PREFIX + 'records_' + getUserId(), JSON.stringify(records));
    return true;
  } catch (e) {
    if (e.name === 'QuotaExceededError' || e.code === 22) {
      // Photo too large, try saving without photos
      var stripped = records.map(function(r) {
        var copy = Object.assign({}, r);
        if (copy.photo && copy.photo.length > 50000) copy.photo = '[照片过大已压缩]';
        return copy;
      });
      try {
        localStorage.setItem(STORAGE_KEY_PREFIX + 'records_' + getUserId(), JSON.stringify(stripped));
        return true;
      } catch (e2) {
        // Still failing, save text-only
        var textOnly = records.map(function(r) {
          var copy = Object.assign({}, r);
          copy.photo = '';
          return copy;
        });
        try {
          localStorage.setItem(STORAGE_KEY_PREFIX + 'records_' + getUserId(), JSON.stringify(textOnly));
          return true;
        } catch (e3) {
          return false;
        }
      }
    }
    return false;
  }
}

function generateId() {
  return 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
}

// ======== Init ========
document.addEventListener('DOMContentLoaded', function() {
  // Check if user exists
  if (!getUserId() || !getUserName()) {
    document.getElementById('nameModal').classList.add('show');
    document.getElementById('modalNameInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') setFirstTimeName();
    });
    setTimeout(function() { document.getElementById('modalNameInput').focus(); }, 500);
  } else {
    setGreeting(getUserName());
  }

  renderPlantList();
  renderPlantSelect();
  renderSuggestions();
  setDefaultDate();
  renderHistory();

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var tab = btn.dataset.tab;
      document.getElementById('tabKnowledge').style.display = tab === 'knowledge' ? 'block' : 'none';
      document.getElementById('tabQA').classList.toggle('show', tab === 'qa');
      document.getElementById('tabGrowth').classList.toggle('show', tab === 'growth');
    });
  });

  // Name input
  document.getElementById('btnSetName').addEventListener('click', function() {
    var name = document.getElementById('nameInput').value.trim();
    if (name) {
      localStorage.setItem(STORAGE_KEY_PREFIX + 'userName', name);
      setGreeting(name);
      showToast('名字已更新！');
    }
  });

  // Photo upload
  document.getElementById('fileInput').addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var preview = document.getElementById('photoPreview');
        preview.src = ev.target.result;
        document.getElementById('photoUpload').classList.add('has-photo');
      };
      reader.readAsDataURL(e.target.files[0]);
    }
  });

  // Q&A Chat - Enter key to send
  document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') askQuestion();
  });
});

function setFirstTimeName() {
  var name = document.getElementById('modalNameInput').value.trim();
  if (!name) { showToast('请输入你的名字哦～'); return; }
  if (!getUserId()) localStorage.setItem(STORAGE_KEY_PREFIX + 'userId', generateId());
  localStorage.setItem(STORAGE_KEY_PREFIX + 'userName', name);
  document.getElementById('nameModal').classList.remove('show');
  setGreeting(name);
  renderHistory();
}

function setGreeting(name) {
  document.getElementById('greetingName').textContent = '你好，' + name + '！';
  document.getElementById('greetingHint').textContent = '来探索植物世界的奥秘吧 🌱';
  document.getElementById('nameInput').value = name;
  document.getElementById('avatarDisplay').textContent = getAvatarForName(name);
  document.getElementById('greetingCard').querySelector('.btn-name').textContent = '✓';
}

function getAvatarForName(name) {
  var avatars = ['🌱', '🌿', '🌸', '🌻', '🌺', '⭐', '💙', '🌼', '🌷', '💜', '❤️', '🌾'];
  var hash = name.split('').reduce(function(a, c) { return a + c.charCodeAt(0); }, 0);
  return avatars[hash % avatars.length];
}

// ======== Plant List ========
function renderPlantList() {
  var container = document.getElementById('plantList');
  container.innerHTML = PLANTS.map(function(p) {
    return '<div class="plant-card" onclick="openDetail(\'' + p.id + '\')">' +
      '<div class="accent" style="background:' + p.color + '"></div>' +
      '<div class="emoji">' + p.emoji + '</div>' +
      '<div class="info"><div class="name">' + p.name + '</div>' +
      '<div class="meta">' + p.eng + ' · 关键词：' + p.keyword + '</div></div>' +
      '<div class="arrow">→</div></div>';
  }).join('');
  document.getElementById('plantCount').textContent = PLANTS.length + '种植物';
}

  var qaContainer = document.getElementById('qaList');

// ======== Growth Record ========
function renderPlantSelect() {
  var sel = document.getElementById('growthPlant');
  sel.innerHTML = '<option value="">选择植物</option>' +
    PLANTS.map(function(p) { return '<option value="' + p.id + '">' + p.emoji + ' ' + p.name + '</option>'; }).join('');
}

function setDefaultDate() {
  var d = new Date();
  document.getElementById('growthDate').value = d.toISOString().split('T')[0];
}

function clearPhoto() {
  document.getElementById('fileInput').value = '';
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoUpload').classList.remove('has-photo');
}

function saveRecord() {
  var plantId = document.getElementById('growthPlant').value;
  var date = document.getElementById('growthDate').value;
  var diary = document.getElementById('diaryInput').value.trim();
  var preview = document.getElementById('photoPreview');
  var photo = preview.src || '';

  if (!plantId) { showToast('请选择你观察的植物 🌱'); return; }
  if (!diary) { showToast('写一点观察日记吧 📝'); return; }

  // Compress photo if too large (reduce to thumbnail size)
  if (photo && photo.length > 200000) {
    photo = compressImage(preview, photo);
  }

  var records = getRecords();
  records.unshift({
    id: Date.now() + '_' + Math.random().toString(36).substr(2, 4),
    plantId: plantId,
    date: date,
    diary: diary,
    photo: photo,
    timestamp: Date.now()
  });

  var saved = saveRecords(records);
  if (!saved) {
    showToast('😅 存储空间不足，请清理旧记录或不上传照片');
    return;
  }

  // Reset form
  clearPhoto();
  document.getElementById('diaryInput').value = '';
  setDefaultDate();

  showToast('🎉 记录已保存！继续加油哦！');
  renderHistory();
}

function compressImage(imgEl, fallbackUrl) {
  var maxW = 300;
  try {
    var w = imgEl.naturalWidth || 1200;
    var h = imgEl.naturalHeight || 1200;
    if (w <= maxW) return fallbackUrl;
    var ratio = maxW / w;
    var canvas = document.createElement('canvas');
    canvas.width = maxW;
    canvas.height = h * ratio;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL('image/jpeg', 0.6);
  } catch(e) {
    return fallbackUrl.slice(0, 100000);
  }
}

// ======== Smart Q&A Engine ========
// Build searchable index from all plant Q&A data
var QA_INDEX = [];
(function buildQAIndex() {
  PLANTS.forEach(function(plant) {
    plant.qa.forEach(function(item, idx) {
      QA_INDEX.push({
        plantId: plant.id,
        plantName: plant.name,
        plantEmoji: plant.emoji,
        plantColor: plant.color,
        question: item.q,
        answer: item.a,
        // Pre-compute keywords for matching
        qKeywords: extractKeywords(item.q),
        aKeywords: extractKeywords(item.a)
      });
    });
  });
})();

// Chinese keyword extraction - split text into meaningful segments
function extractKeywords(text) {
  // Remove emojis and punctuation
  var clean = text.replace(/[\u{1F000}-\u{1FFFF}]|[☀-➿]|[，。！？、；：""''（）【】《》\.,!?;:\-\[\](){}]/gu, ' ');
  // Split by whitespace, filter short words
  var words = [];
  var buf = '';
  for (var i = 0; i < clean.length; i++) {
    var c = clean[i];
    if (c === ' ' || c === '\n') {
      if (buf.length >= 1) words.push(buf);
      buf = '';
    } else {
      buf += c;
    }
  }
  if (buf.length >= 1) words.push(buf);
  // Also extract individual Chinese characters >= 2 for granular matching
  var chars = [];
  for (var j = 0; j < clean.length; j++) {
    var ch = clean[j];
    if (ch >= '一' && ch <= '鿿' && ch !== ' ' && ch !== '\n') {
      chars.push(ch);
    }
  }
  return { words: words, chars: chars };
}

// Check if a keyword set contains a specific term
function hasKeyword(kwSet, term) {
  for (var i = 0; i < kwSet.words.length; i++) {
    if (kwSet.words[i].indexOf(term) >= 0) return true;
  }
  return false;
}

// Count how many query chars appear in text
function countCharMatches(queryChars, kwSet) {
  var count = 0;
  for (var i = 0; i < queryChars.length; i++) {
    for (var j = 0; j < kwSet.chars.length; j++) {
      if (queryChars[i] === kwSet.chars[j]) { count++; break; }
    }
  }
  return count;
}

// Find best matching answer for a question
function findAnswer(question) {
  if (!question || question.trim().length === 0) return null;

  var q = question.trim();
  var qKeywords = extractKeywords(q);
  var qChars = qKeywords.chars;
  var qWords = qKeywords.words;

  // Detect which plant names are mentioned
  var mentionedPlants = [];
  PLANTS.forEach(function(p) {
    if (q.indexOf(p.name) >= 0 || q.indexOf(p.eng.toLowerCase()) >= 0) {
      mentionedPlants.push(p);
    }
  });

  // Score each QA item
  var scored = QA_INDEX.map(function(item) {
    var score = 0;

    // Big bonus if user mentioned this plant name
    if (mentionedPlants.length > 0) {
      var isMentioned = mentionedPlants.some(function(p) { return p.id === item.plantId; });
      if (isMentioned) score += 20;
    }

    // Check keyword overlap in question
    for (var i = 0; i < qWords.length; i++) {
      var w = qWords[i];
      if (w.length < 2) continue;
      if (hasKeyword(item.qKeywords, w)) {
        // Longer word match = more specific
        score += w.length * 2;
      }
      if (hasKeyword(item.aKeywords, w)) {
        score += w.length;
      }
    }

    // Character-level matching (for partial matches)
    var qCharScore = countCharMatches(qChars, item.qKeywords);
    var aCharScore = countCharMatches(qChars, item.aKeywords);
    score += qCharScore * 1.5;
    score += aCharScore * 0.5;

    // Boost if user's question contains question words
    var questionWords = ['什么', '怎么', '为什么', '如何', '多久', '多少', '几', '吗', '能', '可以', '会', '是不是', '有没有'];
    for (var j = 0; j < questionWords.length; j++) {
      if (q.indexOf(questionWords[j]) >= 0) {
        if (item.question && item.question.indexOf(questionWords[j]) >= 0) {
          score += 3;
        }
        break;
      }
    }

    // Bonus for matching longer segments (substring match)
    if (item.question.indexOf(q) >= 0) score += 30;
    // Check partial question match (first 4 chars)
    if (q.length >= 4 && item.question.indexOf(q.substring(0, 4)) >= 0) score += 15;
    if (q.length >= 6 && item.question.indexOf(q.substring(0, 6)) >= 0) score += 20;

    return { item: item, score: score };
  });

  // Sort by score descending
  scored.sort(function(a, b) { return b.score - a.score; });

  // Return best match if score is meaningful
  if (scored.length > 0 && scored[0].score >= 1) {
    return scored[0].item;
  }

  // Fallback: if plant was mentioned but no good match, return general info
  if (mentionedPlants.length > 0) {
    var plant = mentionedPlants[0];
    return {
      plantId: plant.id,
      plantName: plant.name,
      plantEmoji: plant.emoji,
      plantColor: plant.color,
      question: plant.name + '的基本信息',
      answer: plant.qa.map(function(qa) { return qa.a; }).join(' ')
    };
  }

  return null;
}

// Suggestion questions
var SUGGESTIONS = [
  '向日葵需要多少阳光？',
  '牵牛花为什么叫牵牛花？',
  '什么花最好种？',
  '凤仙花为什么叫指甲花？',
  '金盏菊有什么用处？',
  '满天星浇水要注意什么？'
];

function renderSuggestions() {
  var container = document.getElementById('chatSuggestions');
  container.innerHTML = SUGGESTIONS.map(function(q) {
    return '<button class="chip" onclick="askSuggestion(\'' + q.replace(/'/g, "\\'") + '\')">' + q + '</button>';
  }).join('');
}

function addChatMessage(type, content, plantInfo) {
  var container = document.getElementById('chatMessages');
  // Remove welcome if present
  var welcome = document.getElementById('chatWelcome');
  if (welcome) welcome.style.display = 'none';

  var time = new Date();
  var timeStr = time.getHours().toString().padStart(2,'0') + ':' + time.getMinutes().toString().padStart(2,'0');

  var div = document.createElement('div');
  div.className = 'chat-msg ' + type;

  if (type === 'bot' && plantInfo) {
    div.innerHTML =
      '<span class="plant-tag" style="background:' + plantInfo.plantColor + '22;color:' + plantInfo.plantColor + '">' +
      plantInfo.plantEmoji + ' ' + plantInfo.plantName + '</span>' +
      '<div class="msg-text">' + escapeHtml(content.answer || content) + '</div>' +
      (content.question ? '<span class="qa-source">参考: ' + escapeHtml(content.question) + '</span>' : '') +
      '<div class="msg-time">' + timeStr + '</div>';
  } else {
    div.innerHTML = '<div class="msg-text">' + escapeHtml(content) + '</div><div class="msg-time">' + timeStr + '</div>';
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function askQuestion() {
  var input = document.getElementById('chatInput');
  var question = input.value.trim();
  if (!question) return;
  input.value = '';

  // Show user's question
  addChatMessage('user', question);

  // Show typing indicator briefly
  var container = document.getElementById('chatMessages');
  var typing = document.createElement('div');
  typing.className = 'chat-msg bot';
  typing.id = 'typingIndicator';
  typing.innerHTML = '<div class="msg-text">🤔 思考中...</div>';
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;

  // Find answer (with tiny delay for UX)
  setTimeout(function() {
    try {
      var indicator = document.getElementById('typingIndicator');
      if (indicator) indicator.remove();
      var result = findAnswer(question);
      if (result) {
        addChatMessage('bot', { answer: result.answer, question: result.question }, {
          plantColor: result.plantColor,
          plantEmoji: result.plantEmoji,
          plantName: result.plantName
        });
      } else {
        addChatMessage('bot', {
          answer: '我暂时没找到这个问题的答案...\n试试下面的示例问题，或者换个问法？',
          question: ''
        }, { plantColor: '#90A490', plantEmoji: '🌱', plantName: '小助手' });
      }
    } catch(e) {
      addChatMessage('bot', {
        answer: 'Oops！出了点小问题，请截屏告诉老师:\n' + e.message,
        question: ''
      }, { plantColor: '#E53935', plantEmoji: '⚠️', plantName: '报错' });
    }
  }, 300);
}

function askSuggestion(q) {
  document.getElementById('chatInput').value = q;
  askQuestion();
}

function renderHistory() {
  var container = document.getElementById('historyList');
  var records = getRecords();

  if (records.length === 0) {
    container.innerHTML = '<div class="empty-state">' +
      '<div class="icon">🌱</div>' +
      '<p>还没有成长记录呢～<br>种下你的种子，开始观察记录吧！</p></div>';
    return;
  }

  container.innerHTML = records.map(function(r) {
    var plant = PLANTS.find(function(p) { return p.id === r.plantId; });
    var plantName = plant ? plant.emoji + ' ' + plant.name : '未知植物';
    var photoHtml = r.photo ?
      '<img src="' + r.photo + '" alt="植物照片" loading="lazy">' :
      '<div class="no-photo">🌱</div>';
    var dateStr = r.date || new Date(r.timestamp).toLocaleDateString('zh-CN');
    return '<div class="history-item">' +
      '<div class="thumb">' + photoHtml + '</div>' +
      '<div class="hist-info">' +
      '<div class="hist-date">' + dateStr + '</div>' +
      '<div class="hist-plant">' + plantName + '</div>' +
      '<div class="hist-diary">' + escapeHtml(r.diary) + '</div></div></div>';
  }).join('');
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

// ======== Toast ========
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function() { toast.classList.remove('show'); }, 2500);
}
